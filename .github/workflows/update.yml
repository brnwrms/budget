name: Update Budget Display
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  update-display:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Restore transaction cache
        uses: actions/cache/restore@v4
        with:
          path: transactions.json
          key: transactions-${{ github.run_id }}
          restore-keys: |
            transactions-
      
      # --- ONE-TIME: Remove this step and backfill.py after first successful run ---
      - name: Backfill April CC transactions
        run: |
          python backfill.py
      
      - name: Fetch Gmail transactions
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python gmail_fetch.py
      
      - name: Save transaction cache
        uses: actions/cache/save@v4
        with:
          path: transactions.json
          key: transactions-${{ github.run_id }}
      
      - name: Generate display image
        env:
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          PLAID_ACCESS_TOKEN: ${{ secrets.PLAID_ACCESS_TOKEN }}
          PLAID_ENV: production
        run: |
          python generate_display.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add display.png spending_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update display $(date -u +%Y-%m-%d\ %H:%M)" && git push)
